kind = "web"
previewPath = "/"
title = "Imparables SA"
version = "1.0.0"
id = "artifacts/imparables"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18770

[services.development]
run = "pnpm --filter @workspace/imparables run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imparables", "run", "build" ]
publicDir = "artifacts/imparables/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18770"
BASE_PATH = "/"
